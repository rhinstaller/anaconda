# Anaconda configuration file for Fedora MATE-Compiz Spin.

[Profile]
# Define the profile.
profile_id = fedora-matecompiz
base_profile = fedora

[Profile Detection]
# Match os-release values.
os_id = fedora
variant_id = matecompiz

[User Interface]
# Live spin default browser for the Web UI.
webui_web_engine = slitherer
