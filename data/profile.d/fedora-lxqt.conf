# Anaconda configuration file for Fedora LXQt Spin.

[Profile]
# Define the profile.
profile_id = fedora-lxqt
base_profile = fedora

[Profile Detection]
# Match os-release values.
os_id = fedora
variant_id = lxqt

[User Interface]
# Live spin default browser for the Web UI.
webui_web_engine = slitherer
