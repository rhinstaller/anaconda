# Anaconda configuration file for Fedora Xfce Spin.

[Profile]
# Define the profile.
profile_id = fedora-xfce
base_profile = fedora

[Profile Detection]
# Match os-release values.
os_id = fedora
variant_id = xfce

[User Interface]
# Live spin default browser for the Web UI.
webui_web_engine = slitherer
